<svg xmlns="http://www.w3.org/2000/svg" viewBox="28 12 72 104" width="72" height="104" aria-label="Top view car icon"
     role="img">
    <title>Top view car icon</title>

    <!-- Wheels, attached to body -->
    <rect x="28" y="24" width="8" height="22" rx="4" fill="#222"/>
    <rect x="92" y="24" width="8" height="22" rx="4" fill="#222"/>
    <rect x="28" y="82" width="8" height="22" rx="4" fill="#222"/>
    <rect x="92" y="82" width="8" height="22" rx="4" fill="#222"/>

    <!-- Side mirrors -->
    <rect x="30" y="48" width="6" height="14" rx="3" fill="#444"/>
    <rect x="92" y="48" width="6" height="14" rx="3" fill="#444"/>

    <!-- Car body widened so wheels connect -->
    <rect x="36" y="12" width="56" height="104" rx="18" ry="18" fill="#2f6fed"/>

    <!-- Windshield -->
    <rect x="46" y="22" width="36" height="20" rx="8" ry="8" fill="#b9d9ff"/>

    <!-- Roof / cabin -->
    <rect x="42" y="46" width="44" height="36" rx="10" ry="10" fill="#dbe9ff"/>

    <!-- Rear window -->
    <rect x="46" y="86" width="36" height="18" rx="8" ry="8" fill="#b9d9ff"/>

    <!-- Front and rear details -->
    <rect x="50" y="16" width="28" height="4" rx="2" fill="#111" opacity="0.5"/>
    <rect x="50" y="108" width="28" height="4" rx="2" fill="#111" opacity="0.5"/>
</svg>
